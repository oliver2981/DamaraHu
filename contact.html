<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Get in touch with Damara Hu.">
  <title data-i18n="nav.contact">Contact — Damara Hu</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🏠</text></svg>">
</head>
<body>

<main>
  <section class="page-hero">
    <div class="container">
      <h1 class="page-hero-title" data-i18n="contact.hero.title">联系方式</h1>
      <p class="page-hero-subtitle" data-i18n="contact.hero.subtitle">期待与你交流</p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="card-grid-2" style="max-width:900px;margin:0 auto;">
        <div>
          <h2 style="font-size:1.5rem;margin-bottom:1.5rem;" data-i18n="contact.info.heading">找到我</h2>
          <div class="card fade-in" style="margin-bottom:1rem;">
            <p style="margin-bottom:0.3rem;font-weight:600;">Email</p>
            <a href="mailto:hello@example.com" style="color:var(--text-secondary);">hello@example.com</a>
          </div>
          <div class="card fade-in" style="margin-bottom:1rem;">
            <p style="margin-bottom:0.3rem;font-weight:600;">GitHub</p>
            <a href="https://github.com/" target="_blank" rel="noopener" style="color:var(--text-secondary);">github.com/"card fade-in">
            <p style="margin-bottom:0.3rem;font-weight:600;">LinkedIn</p>
            <a href="https://linkedin.com/" target="_blank" rel="noopener" style="color:var(--text-secondary);">linkedin.com/"font-size:1.5rem;margin-bottom:1.5rem;" data-i18n="contact.form.heading">发送消息</h2>
          <form class="card fade-in" id="contactForm" action="https://formspree.io/f/your-form-id" method="POST">
            <div class="form-group">
              <label class="form-label" for="name" data-i18n="contact.form.name">你的名字</label>
              <input class="form-input" type="text" id="name" name="name" required data-i18n="contact.form.name" placeholder="你的名字">
            </div>
            <div class="form-group">
              <label class="form-label" for="email" data-i18n="contact.form.email">你的邮箱</label>
              <input class="form-input" type="email" id="email" name="email" required data-i18n="contact.form.email" placeholder="你的邮箱">
            </div>
            <div class="form-group">
              <label class="form-label" for="message" data-i18n="contact.form.message">你想说的话...</label>
              <textarea class="form-textarea" id="message" name="message" rows="5" required data-i18n="contact.form.message" placeholder="你想说的话..."></textarea>
            </div>
            <button type="submit" class="btn btn-primary" data-i18n="contact.form.submit">发送</button>
            <p id="formSuccess" style="display:none;color:var(--primary);margin-top:1rem;" data-i18n="contact.form.success">消息已发送！感谢你的来信。</p>
          </form>
        </div>
      </div>
    </div>
  </section>
</main>

<script src="js/i18n.js"></script>
<script src="js/shared.js"></script>
</body>
</html>
