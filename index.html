<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Damara Hu — Personal academic-style website. Life-long learner, innovator, result-driven.">
  <title>Damara Hu — Personal Website</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🏠</text></svg>">
</head>
<body>

<main>
  <section class="hero">
    <h1 class="hero-title">
      <span data-i18n="home.hero.greeting">你好，我是</span>
      <span class="accent" data-i18n="home.hero.name">Damara Hu</span>
    </h1>
    <p class="hero-subtitle" data-i18n="home.hero.tagline">终身学习者 · 创新者 · 结果导向</p>
    <div class="hero-cta">
      <a href="about" class="btn btn-primary" data-i18n="home.hero.cta1">了解更多</a>
      <a href="contact" class="btn btn-outline" data-i18n="home.hero.cta2">联系我</a>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <h2 class="section-title" data-i18n="home.navCards.title">探索我的世界</h2>
      <p class="section-subtitle" data-i18n="home.navCards.subtitle">了解我的方方面面</p>
      <div class="nav-cards">
        <a href="about" class="nav-card fade-in">
          <div class="nav-card-icon">📖</div>
          <h3 class="nav-card-title" data-i18n="home.cards.about.title">关于我</h3>
          <p class="nav-card-desc" data-i18n="home.cards.about.desc">我的故事、价值观与身份认同</p>
        </a>
        <a href="education" class="nav-card fade-in">
          <div class="nav-card-icon">🎓</div>
          <h3 class="nav-card-title" data-i18n="home.cards.education.title">教育成长</h3>
          <p class="nav-card-desc" data-i18n="home.cards.education.desc">学术旅程与关键成长节点</p>
        </a>
        <a href="projects" class="nav-card fade-in">
          <div class="nav-card-icon">💻</div>
          <h3 class="nav-card-title" data-i18n="home.cards.projects.title">项目与研究</h3>
          <p class="nav-card-desc" data-i18n="home.cards.projects.desc">工作经历与研究方向</p>
        </a>
        <a href="interests" class="nav-card fade-in">
          <div class="nav-card-icon">🎨</div>
          <h3 class="nav-card-title" data-i18n="home.cards.interests.title">兴趣与生活</h3>
          <p class="nav-card-desc" data-i18n="home.cards.interests.desc">课堂之外，我的热爱所在</p>
        </a>
      </div>
    </div>
  </section>
</main>

<script src="js/i18n-data.js"></script>
<script src="js/i18n-engine.js"></script>
<script src="js/shared.js"></script>
</body>
</html>
