<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose" aria-label="Close">&times;</button>
  <button class="lightbox-prev" id="lightboxPrev" aria-label="Previous">&lsaquo;</button>
  <img src="" alt="" id="lightboxImg">
  <button class="lightbox-next" id="lightboxNext" aria-label="Next">&rsaquo;</button>
</div>

<script>
(function() {
  'use strict';

  /* === Photo Lightbox === */
  var photoItems = document.querySelectorAll('.photo-item');
  var lightbox = document.getElementById('lightbox');
  var lightboxImg = document.getElementById('lightboxImg');
  var currentIndex = -1;
  var photoArray = [];

  photoItems.forEach(function(item) {
    var fullSrc = item.getAttribute('data-full');
    var img = item.querySelector('img');
    if (img && img.src) {
      photoArray.push(img.src);
      item.setAttribute('data-index', photoArray.length - 1);
    } else if (fullSrc) {
      photoArray.push(fullSrc);
      item.setAttribute('data-index', photoArray.length - 1);
    }
  });

  photoItems.forEach(function(item) {
    item.addEventListener('click', function() {
      var idx = parseInt(item.getAttribute('data-index'));
      if (idx >= 0 && idx < photoArray.length) {
        openLightbox(idx);
      }
    });
  });

  function openLightbox(index) {
    currentIndex = index;
    lightboxImg.src = photoArray[index];
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lightbox.classList.remove('open');
    document.body.style.overflow = '';
  }

  function nextPhoto() {
    if (photoArray.length === 0) return;
    currentIndex = (currentIndex + 1) % photoArray.length;
    lightboxImg.src = photoArray[currentIndex];
  }

  function prevPhoto() {
    if (photoArray.length === 0) return;
    currentIndex = (currentIndex - 1 + photoArray.length) % photoArray.length;
    lightboxImg.src = photoArray[currentIndex];
  }

  document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
  document.getElementById('lightboxNext').addEventListener('click', nextPhoto);
  document.getElementById('lightboxPrev').addEventListener('click', prevPhoto);

  lightbox.addEventListener('click', function(e) {
    if (e.target === lightbox) closeLightbox();
  });

  document.addEventListener('keydown', function(e) {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowRight') nextPhoto();
    if (e.key === 'ArrowLeft') prevPhoto();
  });
})();
</script>

<script src="js/i18n-data.js"></script>
<script src="js/i18n-engine.js"></script>
<script src="js/shared.js"></script>
<script>
(function() {
  'use strict';

  // Display name from filename: "summer-breeze.mp3" → "Summer Breeze"
  function nameFromFile(file) {
    var name = file.replace(/\.[^.]+$/, '');       // strip extension
    name = name.replace(/[-_]/g, ' ');              // hyphens/underscores → spaces
    // Capitalize words (only ASCII, leave CJK untouched)
    name = name.replace(/[a-z]+/gi, function(w) {
      return w.charAt(0).toUpperCase() + w.slice(1).toLowerCase();
    });
    return name;
  }

  function fetchList(url, callback) {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', url, true);
    xhr.onload = function() {
      if (xhr.status === 200) {
        var lines = xhr.responseText.split('\n').map(function(l) { return l.trim(); }).filter(Boolean);
        callback(lines);
      }
    };
    xhr.send();
  }

  function renderAudioPlaylist(files) {
    var container = document.getElementById('audioPlaylist');
    if (!container) return;
    var html = '';
    for (var i = 0; i < files.length; i++) {
      var title = nameFromFile(files[i]);
      html += '<div class="card fade-in" style="padding:1.5rem;margin-bottom:1rem;">' +
        '<h3 style="margin:0 0 1rem;font-size:1.1rem;">' + title + '</h3>' +
        '<audio controls preload="metadata" style="width:100%;">' +
        '<source src="assets/audio/' + files[i] + '" type="audio/mpeg">' +
        '</audio></div>';
    }
    container.innerHTML = html;
  }

  function renderVideoGrid(files) {
    var container = document.getElementById('videoGrid');
    if (!container) return;
    var html = '';
    for (var i = 0; i < files.length; i++) {
      var title = nameFromFile(files[i]);
      html += '<div class="video-card fade-in">' +
        '<div class="video-wrapper">' +
        '<video controls preload="metadata" poster="assets/images/avatar.jpg">' +
        '<source src="assets/videos/' + files[i] + '" type="video/mp4">' +
        '</video></div>' +
        '<div class="video-card-body"><h3>' + title + '</h3></div>' +
        '</div>';
    }
    container.innerHTML = html;
  }

  fetchList('assets/audio/list.txt', function(files) {
    renderAudioPlaylist(files);
    reobserveAnimations();
  });

  fetchList('assets/videos/list.txt', function(files) {
    renderVideoGrid(files);
    reobserveAnimations();
  });
})();
</script>
