<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="About Damara Hu — Story, values, and identity.">
  <title data-i18n="about.hero.title">About Me — Damara Hu</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🏠</text></svg>">
</head>
<body>

<main>
  <section class="page-hero">
    <div class="container">
      <h1 class="page-hero-title" data-i18n="about.hero.title">关于我</h1>
      <p class="page-hero-subtitle" data-i18n="about.hero.subtitle">你好，我是胡美婧（Damara），一个内在真正有趣的灵魂</p>
    </div>
  </section>

  <!-- Avatar & Tags -->
  <section class="section">
    <div class="container" style="text-align:center; max-width:300px; margin: 0 auto 2rem;">
      <div style="width:140px;height:140px;border-radius:50%;overflow:hidden;margin:0 auto 1rem;box-shadow:0 4px 20px rgba(0,0,0,0.15);">
        <img src="assets/images/avatar.jpg" alt="Damara Hu" style="width:100%;height:100%;object-fit:cover;">
      </div>
      <div style="display:flex;gap:0.5rem;justify-content:center;flex-wrap:wrap;">
        <span class="tag" data-i18n="about.tags.innovator">创新者</span>
        <span class="tag" data-i18n="about.tags.learner">学习者</span>
        <span class="tag" data-i18n="about.tags.explorer">探索者</span>
      </div>
    </div>
  </section>

  <!-- My Story -->
  <section class="section section-alt">
    <div class="container">
      <h2 class="section-title" data-i18n="about.story.heading">我的故事</h2>
      <div class="card fade-in" style="max-width:750px;margin:2rem auto;">
        <p style="font-size:1.05rem;line-height:1.9;" data-i18n="about.story.text">你好！我是 Damara。我坚信，个人成长不是单一的轨迹，而是在多个维度同时展开的探索。作为创造者，我享受将想法转化为切实的项目和成果；作为探索者，我对世界充满好奇，不断在兴趣和生活中发现新的可能性。这个网站就像一所大学的不同院系，展示着我作为"一个人"的各个侧面。</p>
      </div>
    </div>
  </section>

  <!-- Core Values -->
  <section class="section">
    <div class="container">
      <h2 class="section-title" data-i18n="about.values.heading">核心价值观</h2>
      <div class="card-grid" style="max-width:900px;margin:2rem auto;">
        <div class="card fade-in">
          <div class="card-icon">📚</div>
          <h3 class="card-title" data-i18n="about.values.0.title">终身学习</h3>
          <p class="card-desc" data-i18n="about.values.0.desc">不断提问、持续学习，永远追求进步</p>
        </div>
        <div class="card fade-in">
          <div class="card-icon">🚀</div>
          <h3 class="card-title" data-i18n="about.values.1.title">结果导向</h3>
          <p class="card-desc" data-i18n="about.values.1.desc">享受从"0"到"1"的过程</p>
        </div>
        <div class="card fade-in">
          <div class="card-icon">🌱</div>
          <h3 class="card-title" data-i18n="about.values.2.title">韧性</h3>
          <p class="card-desc" data-i18n="about.values.2.desc">每一次挫折都让我变得更强大</p>
        </div>
        <div class="card fade-in">
          <div class="card-icon">🤝</div>
          <h3 class="card-title" data-i18n="about.values.3.title">同理心</h3>
          <p class="card-desc" data-i18n="about.values.3.desc">在AI时代，强大的共情能力是稀缺品质</p>
        </div>
      </div>
    </div>
  </section>
</main>

<script src="js/i18n-data.js"></script>
<script src="js/i18n-engine.js"></script>
<script src="js/shared.js"></script>
</body>
</html>
